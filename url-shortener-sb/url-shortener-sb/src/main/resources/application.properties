spring.application.name=url-shortener-sb
server.port=9001
server.forward-headers-strategy=framework
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


jwt.secret=${JWT_SECRET}
jwt.expiration=172800000
frontend.url=${FRONTEND_URL:http://localhost:5173}

google.safe-browsing.url=https://safebrowsing.googleapis.com/v4/threatMatches:find
google.safe-browsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY}

virustotal.url=https://www.virustotal.com/api/v3/urls
virustotal.analysis-url=https://www.virustotal.com/api/v3/analyses/%s
virustotal.api-key=${VIRUSTOTAL_API_KEY}
virustotal.poll.max-attempts=5
virustotal.poll.delay-ms=1200

urlscan.api-key=${URLSCAN_API_KEY}
urlscan.submit-url=https://urlscan.io/api/v1/scan/
urlscan.result-url-template=https://urlscan.io/api/v1/result/%s/
urlscan.poll.max-attempts=6
urlscan.poll.delay-ms=1500

ipapi.key=${IPAPI_KEY}
ip.resolver.trusted-proxies=0.0.0.0/0,::/0

url.scan.max-length=2048
url.scan.redirect.max-depth=10
url.scan.internal-hosts=localhost,127.0.0.1

url.scan.cache.enabled=true
url.scan.cache.ttl-seconds=600
url.scan.cache.max-size=1000

url.scan.rate-limit.ip-per-minute=60
url.scan.rate-limit.user-per-minute=30
url.scan.rate-limit.cleanup-ms=300000
url.scan.quota.user-per-day=1000

url.scan.async.job-retention-seconds=900
url.scan.async.max-jobs=200
url.scan.async.cleanup-interval-ms=60000
url.scan.async.timeout-ms=20000
url.scan.async.core-pool-size=8
url.scan.async.max-pool-size=16
url.scan.async.queue-capacity=200

http.client.connect-timeout-ms=4000
http.client.read-timeout-ms=7000
http.client.retry.max-attempts=3
http.client.retry.initial-delay-ms=250

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework=INFO
logging.level.com.url.shortener=INFO
logging.level.com.url.shortener.security=DEBUG
logging.level.com.url.shortener.security.jwt=DEBUG
