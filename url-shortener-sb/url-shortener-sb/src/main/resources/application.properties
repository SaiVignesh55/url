spring.application.name=url-shortener-sb
server.port=9000

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT}


jwt.secret=${JWT_SECRET}
jwt.expiration=172800000
frontend.url=${FRONTEND_URL}
google.safe-browsing.url=https://safebrowsing.googleapis.com/v4/threatMatches:find
google.safe-browsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY}
virustotal.url=https://www.virustotal.com/api/v3/urls
virustotal.api-key=${VIRUSTOTAL_API_KEY}
urlscan.api-key=${URLSCAN_API_KEY}
urlscan.submit-url=https://urlscan.io/api/v1/scan/
urlscan.result-url-template=https://urlscan.io/api/v1/result/%s/
urlscan.poll.max-attempts=6
urlscan.poll.delay-ms=1500

# URL scanner configuration
url.scan.max-length=120
url.scan.score.no-https=20
url.scan.score.long-url=20
url.scan.score.suspicious-keywords=20
url.scan.score.google-threat=60
url.scan.score.urlscan-malicious=40
url.scan.score.urlscan-suspicious=20
url.scan.score.redirect-depth=10
url.scan.score.domain-change=15
url.scan.score.typosquatting=20
url.scan.score.fake-domain=20
url.scan.score.suspicious-tld=15
url.scan.score.piracy-keywords=40
url.scan.score.query-param-spam=10
url.scan.score.ad-keywords=15
url.scan.score.external-unavailable=10
url.scan.suspicious-keywords=login,verify,bank,password,free,gift,wallet,update
url.scan.suspicious-tlds=xyz,tk,top
url.scan.piracy-keywords=movie,download,watch free,torrent
url.scan.ad-keywords=ads,click,redirect,banner
url.scan.trusted-domains=facebook.com,google.com,twitter.com
url.scan.brand-domains=facebook,google,microsoft,instagram,amazon,paypal
url.scan.threshold.suspicious=21
url.scan.threshold.unsafe=61

# URL scanner (Phase 5) cache configuration
url.scan.cache.enabled=true
url.scan.cache.ttl-seconds=600
url.scan.cache.max-size=500

# URL scanner (Phase 6) async job retention
url.scan.async.job-retention-seconds=900
url.scan.async.max-jobs=200
url.scan.async.cleanup-interval-ms=60000
url.scan.async.timeout-ms=20000

logging.level.org.springframework.security=DEBUG
logging.level.org.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE

